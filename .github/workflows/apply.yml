name: Apply Discord Template

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      reset:
        description: 'Delete all channels/roles before applying (full reset)'
        required: false
        type: boolean
        default: false
      welcome:
        description: 'Post welcome embeds to #rules and #roadmap'
        required: false
        type: boolean
        default: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install requests
      - name: Apply template
        run: |
          RESET_FLAG=""
          if [ "${{ inputs.reset }}" = "true" ]; then
            RESET_FLAG="--reset"
          fi
          python setup.py --token ${{ secrets.DISCORD_BOT_TOKEN }} --guild ${{ secrets.DISCORD_GUILD_ID }} --template template.json $RESET_FLAG
      - name: Post welcome embeds
        if: inputs.welcome == true || inputs.reset == true
        run: python welcome.py --token ${{ secrets.DISCORD_BOT_TOKEN }} --guild ${{ secrets.DISCORD_GUILD_ID }}
